application:
  name: logto
  pods:
  - name: app
    image: svhd/logto:latest
    path: /
    command: sh -c "npm run cli db seed -- --swe || true; npm start"
    servicePorts:
    - 3001
    vars:
      DB_URL: "postgresql://logto:logto@logto-postgres-service:5432/logto"
      ENDPOINT: "https://relaxed-weasel-logto.cloud.nexlayer.ai"
      ADMIN_ENDPOINT: "https://relaxed-weasel-logto.cloud.nexlayer.ai"
      TRUST_PROXY_HEADER: "1"
  - name: postgres
    image: postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: logto
      POSTGRES_USER: logto
      POSTGRES_PASSWORD: logto
    volumes:
    - name: logto-db
      mountPath: /var/lib/postgresql/data
      size: 5Gi
