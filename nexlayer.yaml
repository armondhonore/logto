application:
  name: logto
  pods:
  - name: app
    image: mirror.gcr.io/svhd/logto:latest
    path: /
    servicePorts:
    - 3001
    vars:
      DB_URL: "postgresql://logto:logto@logto-postgres-service:5432/logto"
      ENDPOINT: "https://relaxed-weasel-logto.cloud.nexlayer.ai"
      TRUST_PROXY_HEADER: "1"
      NO_INQUIRY: "1"
  - name: postgres
    image: mirror.gcr.io/library/postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: logto
      POSTGRES_USER: logto
      POSTGRES_PASSWORD: logto
    volumes:
    - name: logto-db
      mountPath: /var/lib/postgresql/data
      size: 5Gi
